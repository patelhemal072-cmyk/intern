<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Error Infotech</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .dashboard-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--white);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .dashboard-header h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            padding: 8px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .stat-card h3 {
            font-size: 1rem;
            color: var(--gray-dark);
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .applications-card {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 30px;
            background: var(--light);
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 1.2rem;
            margin: 0;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 30px;
            background: var(--light);
            color: var(--gray-dark);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 30px;
            border-bottom: 1px solid var(--gray-light);
            color: var(--darker);
            font-size: 0.95rem;
        }

        tr:hover {
            background: #f8fafc;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-program {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-package {
            background: #fef3c7;
            color: #92400e;
        }

        .loading-overlay {
            padding: 50px;
            text-align: center;
            font-size: 1.2rem;
            color: var(--gray-dark);
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 20px;
            }

            .dashboard-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>

<body style="background: #f3f4f6;">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="brand">
                <h1>Admin Dashboard</h1>
            </div>
            <div class="user-info">
                <span id="adminName">Loading...</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Applications</h3>
                <div class="value" id="totalApps">0</div>
            </div>
            <div class="stat-card">
                <h3>Today's Applications</h3>
                <div class="value" id="todayApps">0</div>
            </div>
        </div>

        <div class="applications-card">
            <div class="card-header">
                <h2>Recent Applications</h2>
                <button class="submit-button" onclick="loadApplications()"
                    style="width:auto; padding:8px 15px; font-size:0.9rem;">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
            <div class="table-responsive">
                <table id="appsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>Program</th>
                            <th>Package</th>
                            <th>Duration</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="appsBody">
                        <tr>
                            <td colspan="6" class="loading-overlay">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function checkAuth() {
            // In a real app, we'd call an api/auth/me endpoint. 
            // For now or if we use local JSON or something.
            // But we have JWT in cookie, so we just try to fetch applications.
            loadApplications();
        }

        async function getBaseUrl() {
            const endpoints = [];
            const hostname = window.location.hostname;
            const protocol = window.location.protocol;

            if (protocol === 'file:') {
                endpoints.push('http://127.0.0.1:5002', 'http://localhost:5002');
            } else if (hostname === 'localhost' || hostname === '127.0.0.1') {
                endpoints.push(`http://${hostname}:5002`);
                endpoints.push(hostname === 'localhost' ? 'http://127.0.0.1:5002' : 'http://localhost:5002');
            } else if (hostname) {
                // Try the current hostname first, then try local loopbacks as fallback
                endpoints.push(`http://${hostname}:5002`);
                endpoints.push('http://127.0.0.1:5002', 'http://localhost:5002');
            } else {
                endpoints.push('http://127.0.0.1:5002', 'http://localhost:5002');
            }
            return [...new Set(endpoints)];
        }

        async function loadApplications() {
            const body = document.getElementById('appsBody');
            const uniqueEndpoints = await getBaseUrl();

            const attemptFetch = async (index = 0) => {
                const baseUrl = uniqueEndpoints[index];
                if (!baseUrl) {
                    throw new Error('All connection attempts failed. Please ensure the backend server is running on port 5002.');
                }

                try {
                    const response = await fetch(`${baseUrl}/api/forms`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                        credentials: 'include'
                    });

                    if (response.status === 401 || response.status === 403) {
                        window.location.href = 'admin-login.html';
                        return null;
                    }

                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    return await response.json();
                } catch (err) {
                    console.warn(`Attempt ${index + 1} failed for ${baseUrl}:`, err.message);
                    return attemptFetch(index + 1);
                }
            };

            try {
                const data = await attemptFetch(0);
                if (data) renderApplications(data);
            } catch (err) {
                console.error(err);
                body.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:red;">
                    <i class="fas fa-exclamation-triangle"></i> ${err.message}
                </td></tr>`;
            }
        }

        function renderApplications(apps) {
            const body = document.getElementById('appsBody');
            const total = document.getElementById('totalApps');

            total.textContent = apps.length;

            if (apps.length === 0) {
                body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px;">No applications found yet.</td></tr>';
                return;
            }

            body.innerHTML = apps.map(app => `
                <tr>
                    <td><strong>${app.fullName}</strong></td>
                    <td>
                        <div>${app.email}</div>
                        <div style="font-size:0.85rem; color:#64748b;">${app.phone || 'N/A'}</div>
                    </td>
                    <td><span class="badge badge-program">${app.program}</span></td>
                    <td><span class="badge badge-package">${app.package}</span></td>
                    <td>${app.experience} Months</td>
                    <td>${new Date(app.submittedAt || Date.now()).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function logout() {
            // Implementation for logout
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = 'admin-login.html';
        }

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>

</html>
